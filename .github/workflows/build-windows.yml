name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - "codex/**"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: address-enrichment-example

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build executable
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          .\build_windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AddressEnrichment-windows
          path: address-enrichment-example/dist/AddressEnrichment-windows.zip
